services:
  - type: web
    name: note-maker-server
    runtime: node
    root: server
    node:
      version: 18.17.1
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
  - type: web
    name: note-maker-client
    runtime: static
    root: client
    node:
      version: 18.17.1
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    routes:
      - type: redirect
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: note-maker-server
          property: host