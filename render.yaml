services:
  - type: web
    name: note-maker-server
    runtime: node
    root: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
  - type: web
    name: note-maker-service
    runtime: python
    root: service-provider
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false
  - type: web
    name: note-maker-client
    runtime: static
    root: client
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    routes:
      - type: redirect
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: note-maker-server
          property: host
      - key: REACT_APP_SERVICE_URL
        fromService:
          type: web
          name: note-maker-service
          property: host