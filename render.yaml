services:
  - type: web
    name: subject-notes-server
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
  - type: web
    name: subject-notes-service
    runtime: python3
    buildCommand: cd service-provider && pip install -r requirements.txt
    startCommand: cd service-provider && python app.py
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false
  - type: web
    name: subject-notes-client
    runtime: static
    buildCommand: cd client && npm run build
    staticPublishPath: client/build
    routes:
      - type: redirect
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: subject-notes-server
          property: host
      - key: REACT_APP_SERVICE_URL
        fromService:
          type: web
          name: subject-notes-service
          property: host